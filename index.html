<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>혼자 하는 끝말잇기</title>
<style>
  :root{
    --bg1:#7ed8ff; --bg2:#a8a0ff; --card:#ffffff; --ink:#2b2b44;
    --accent:#ff7aa2; --accent2:#ffd23f; --good:#34d399; --soft:#f1f3ff;
    --shadow:0 10px 30px rgba(60,60,120,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    color:var(--ink); background:linear-gradient(160deg,var(--bg1),var(--bg2));
    overflow:hidden; touch-action:manipulation;
  }
  #app{height:100%; display:flex; flex-direction:column; max-width:900px; margin:0 auto;}
  .hidden{display:none !important;}

  /* ---------- HUD ---------- */
  #hud{display:flex; align-items:center; gap:10px; padding:14px 18px; flex-wrap:wrap;}
  .pill{background:rgba(255,255,255,.85); border-radius:18px; padding:8px 14px; font-weight:800;
        font-size:18px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px;}
  .pill .lbl{font-size:12px; font-weight:700; color:#8a8aa8;}
  #lives{font-size:22px; letter-spacing:2px;}
  #spacer{flex:1;}
  .ghostbtn{background:rgba(255,255,255,.5); border:none; border-radius:14px; padding:8px 12px;
            font-weight:800; font-size:15px; color:#5a5a78;}

  /* ---------- chain trail ---------- */
  #trail{display:flex; align-items:center; gap:6px; padding:4px 18px 0; overflow-x:auto; min-height:46px;}
  .word-chip{background:#fff; border-radius:14px; padding:6px 12px; font-weight:800; font-size:18px;
             white-space:nowrap; box-shadow:0 4px 10px rgba(60,60,120,.12);}
  .word-chip.seed{background:var(--accent2);}
  .arrow{color:#fff; font-weight:900; opacity:.8;}

  /* ---------- main play area ---------- */
  #play{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:10px; padding:14px 18px 36px; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  #prompt{font-size:22px; font-weight:800; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.12); text-align:center;}
  #bigSyl{font-size:84px; font-weight:900; color:#fff; line-height:1;
          text-shadow:0 6px 0 rgba(0,0,0,.12); margin:2px 0 4px; animation:pop .4s ease;}
  @keyframes pop{from{transform:scale(.5);opacity:0;} to{transform:scale(1);opacity:1;}}
  #heard{min-height:24px; font-size:16px; font-weight:700; color:#fff; opacity:.95;}

  /* mic */
  #mic{width:128px; height:128px; border-radius:50%; border:none; background:radial-gradient(circle at 30% 25%,#fff,var(--accent));
       color:#fff; font-size:54px; box-shadow:0 12px 26px rgba(255,80,130,.45); transition:transform .12s;}
  #mic:active{transform:scale(.94);}
  #mic.listening{animation:pulse 1s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,122,162,.6);}70%{box-shadow:0 0 0 26px rgba(255,122,162,0);}100%{box-shadow:0 0 0 0 rgba(255,122,162,0);}}
  #micLabel{font-size:16px; font-weight:800; color:#fff;}

  /* candidate buttons */
  #cands{display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:560px;}
  .cand{display:flex; align-items:center; justify-content:space-between; gap:8px;
        background:var(--card); border:none; border-radius:20px; padding:18px 16px; box-shadow:var(--shadow);
        font-size:26px; font-weight:900; color:var(--ink); animation:pop .3s ease;}
  .cand:active{transform:scale(.97);}
  .cand .spk{font-size:24px; background:var(--soft); border-radius:12px; padding:6px 8px;}

  /* action row */
  #actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .act{border:none; border-radius:16px; padding:12px 16px; font-weight:800; font-size:16px; box-shadow:var(--shadow);}
  .act.hint{background:var(--accent2); color:#7a5b00;}
  .act.pick{background:#fff; color:#5a5a78;}
  .act.giveup{background:#ffb3c6; color:#7a2a45;}
  .act.stop{background:rgba(255,255,255,.45); color:#5a5a78;}

  /* hint box */
  #hintbox{width:100%; max-width:560px; background:rgba(255,255,255,.92); border-radius:18px;
           padding:14px 16px; box-shadow:var(--shadow); font-size:18px; font-weight:700;}
  #hintbox .cho{font-size:40px; font-weight:900; letter-spacing:8px; color:var(--accent);}

  /* ---------- modal ---------- */
  .mask{position:fixed; inset:0; background:rgba(40,40,70,.5); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50;}
  .modal{background:#fff; border-radius:24px; padding:18px; width:100%; max-width:560px; max-height:86vh; overflow:auto; box-shadow:var(--shadow);}
  .modal h2{margin:2px 0 10px; font-size:22px;}
  .modal .sub{color:#8a8aa8; font-weight:700; font-size:14px; margin-bottom:12px;}
  .wordgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .wgi{display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--soft);
       border:none; border-radius:16px; padding:14px; font-size:22px; font-weight:900; color:var(--ink);}
  .wgi .spk{font-size:20px;}
  .closebtn{margin-top:14px; width:100%; border:none; border-radius:16px; padding:14px; font-weight:800; font-size:17px; background:var(--accent); color:#fff;}
  .defpop{margin-top:10px; background:#fff8e6; border:2px dashed var(--accent2); border-radius:14px; padding:12px; font-size:17px; font-weight:700; line-height:1.5;}

  /* picker list */
  #pickerList{display:flex; flex-direction:column; gap:8px;}
  .pli{display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--soft);
       border:none; border-radius:14px; padding:12px 14px; font-size:20px; font-weight:800; color:var(--ink);}
  .pli .lv{font-size:12px; color:#fff; background:var(--accent); border-radius:8px; padding:2px 8px; font-weight:800;}

  /* ---------- start / end screens ---------- */
  .center-screen{position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
                 text-align:center; padding:24px; gap:14px; z-index:40;
                 background:linear-gradient(160deg,var(--bg1),var(--bg2));}
  .title{font-size:40px; font-weight:900; color:#fff; text-shadow:0 4px 0 rgba(0,0,0,.12);}
  .big-emoji{font-size:64px;}
  .bigbtn{border:none; border-radius:22px; padding:18px 34px; font-size:24px; font-weight:900;
          background:var(--accent2); color:#7a5b00; box-shadow:var(--shadow);}
  .scorebox{background:rgba(255,255,255,.9); border-radius:20px; padding:18px 26px; box-shadow:var(--shadow);}
  .scorebox .num{font-size:48px; font-weight:900; color:var(--accent);}
  .scorebox .row{display:flex; gap:26px; justify-content:center;}
  .small{font-size:14px; color:#fff; opacity:.9; max-width:520px; line-height:1.5;}
  #toast{position:fixed; left:50%; top:18px; transform:translateX(-50%); background:#2b2b44; color:#fff;
         padding:10px 18px; border-radius:14px; font-weight:800; z-index:100; opacity:0; transition:opacity .25s;}
  #toast.show{opacity:.95;}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="pill"><span class="lbl">레벨</span><span id="level">1</span></div>
    <div class="pill"><span class="lbl">이은 단어</span><span id="count">0</span></div>
    <div class="pill"><span class="lbl">점수</span><span id="score">0</span></div>
    <div id="spacer"></div>
    <button class="ghostbtn" id="btnVoice" title="목소리 고르기">🔈</button>
    <div class="pill"><span class="lbl">이어가기</span><span id="lives">⭐⭐⭐⭐</span></div>
  </div>

  <div id="trail"></div>

  <div id="play">
    <div id="prompt">이 글자로 시작하는 단어를 말해봐!</div>
    <div id="bigSyl">가</div>
    <div id="heard"></div>

    <button id="mic">🎤</button>
    <div id="micLabel">마이크를 누르고 말해요</div>

    <div id="cands" class="hidden"></div>
    <div id="hintbox" class="hidden"></div>

    <div id="actions">
      <button class="act hint" id="btnHint">💡 힌트</button>
      <button class="act giveup" id="btnGiveup">🤔 모르겠어요</button>
      <button class="act stop" id="btnStop">⏹ 그만하기</button>
    </div>
  </div>
</div>

<!-- start screen -->
<div id="startScreen" class="center-screen">
  <div class="big-emoji">🦊</div>
  <div class="title">끝말잇기</div>
  <div class="small">마이크를 누르고 단어를 말하면, <b>말한 것과 비슷한 단어</b>가 나와요.<br>생각한 단어가 없으면 <b>🎤 다시 말하기</b>로 또박또박 다시! 몇 개까지 이을 수 있을까?</div>
  <div id="bestStart" class="small"></div>
  <button class="bigbtn" id="btnStart">시작하기 ▶</button>
  <button class="ghostbtn" id="btnVoice2" style="background:rgba(255,255,255,.7)">🔈 목소리 고르기</button>
  <div id="loadMsg" class="small">단어를 불러오는 중… ⏳</div>
</div>

<!-- end screen -->
<div id="endScreen" class="center-screen hidden">
  <div class="big-emoji" id="endEmoji">🎉</div>
  <div class="title" id="endTitle">잘했어요!</div>
  <div class="scorebox">
    <div class="row">
      <div><div class="num" id="endCount">0</div><div>이은 단어</div></div>
      <div><div class="num" id="endScore">0</div><div>점수</div></div>
    </div>
    <div id="endBest" style="margin-top:8px; font-weight:800; color:#8a8aa8;"></div>
  </div>
  <div class="small">다음엔 이런 단어로 이어 봐요! (눌러서 뜻 보기 🔊)</div>
  <div id="endWords" class="wordgrid" style="max-width:560px; width:100%;"></div>
  <div id="endDef" class="defpop hidden" style="max-width:560px; width:100%;"></div>
  <button class="bigbtn" id="btnRestart">다시하기 🔄</button>
</div>

<div id="toast"></div>

<script>
"use strict";

/* ===================== Hangul utils ===================== */
const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const YV = new Set([2,3,6,7,12,17,20]); // 반모음 ㅑㅒㅕㅖㅛㅠㅣ -> 두음 ㄹ/ㄴ→ㅇ

function decomp(ch){
  const c = ch.charCodeAt(0);
  if(c < 0xAC00 || c > 0xD7A3) return null;
  const s = c - 0xAC00;
  return [Math.floor(s/588), Math.floor((s%588)/28), s%28];
}
function compose(o,n,j){ return String.fromCharCode(0xAC00 + o*588 + n*28 + j); }

// 끝글자 -> 다음에 허용되는 시작 글자(두음법칙 포함)
function nextStarts(ch){
  const d = decomp(ch);
  if(!d) return [ch];
  const [o,n,j] = d;
  const res = [ch];
  if(o === 5){ res.push(compose(YV.has(n)?11:2, n, j)); }       // ㄹ → ㅇ or ㄴ
  else if(o === 2){ if(YV.has(n)) res.push(compose(11, n, j)); } // ㄴ → ㅇ
  return res;
}
// 단어의 초성 문자열 (사과 -> "ㅅㄱ")
function choseong(word){
  let r = '';
  for(const ch of word){ const d = decomp(ch); r += d ? CHO[d[0]] : ch; }
  return r;
}
// 자모 시퀀스 (편집거리용)
function toJamo(str){
  const out = [];
  for(const ch of str){
    const d = decomp(ch);
    if(d){ out.push(CHO[d[0]], JUNG[d[1]]); if(d[2]) out.push(JONG[d[2]]); }
  }
  return out;
}
function editDist(a, b){
  const m=a.length, n=b.length;
  if(m===0) return n; if(n===0) return m;
  let prev = new Array(n+1); for(let j=0;j<=n;j++) prev[j]=j;
  for(let i=1;i<=m;i++){
    let cur=[i];
    for(let j=1;j<=n;j++){
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      cur[j] = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
    }
    prev=cur;
  }
  return prev[n];
}
function onlyHangul(s){ return (s||'').replace(/[^가-힣]/g,''); }

/* ===================== Data ===================== */
let ENTRY = new Map();      // word -> {lv, def}
let BYSTART = new Map();    // 시작글자 -> [word,...]
let LV1 = [];               // 레벨1 단어 (시작어 후보)
let DATA_READY = false;

async function loadData(){
  const res = await fetch('words.json', {cache:'force-cache'});
  if(!res.ok) throw new Error('words.json '+res.status);
  const j = await res.json();
  for(const it of j.words){
    ENTRY.set(it.w, {lv:it.lv, def:it.def||''});
    const f = it.w[0];
    if(!BYSTART.has(f)) BYSTART.set(f, []);
    BYSTART.get(f).push(it.w);
    if(it.lv===1) LV1.push(it.w);
  }
  DATA_READY = true;
}

/* ===================== Game state ===================== */
const G = {
  chain:[], used:new Set(), curStarts:[], score:0,
  hintsThisTurn:0, lives:4, hintWord:null
};

function currentLevel(){ return Math.min(5, 1 + Math.floor(G.chain.length/5)); }
function lastChar(){ const w = G.chain[G.chain.length-1]; return w[w.length-1]; }

// 현재 이어갈 수 있는 유효 단어 목록 (미사용)
function validWords(){
  const out = [];
  for(const s of G.curStarts){
    const arr = BYSTART.get(s);
    if(!arr) continue;
    for(const w of arr){ if(!G.used.has(w)) out.push(w); }
  }
  return out;
}
// 레벨 우선 정렬 후 n개 추출 (다양성 위해 약간 섞음)
function pickByLevel(words, n){
  const lvl = currentLevel();
  const scored = words.map(w=>({w, d:Math.abs(ENTRY.get(w).lv - lvl) + Math.random()*0.9}));
  scored.sort((a,b)=>a.d-b.d);
  return scored.slice(0, n).map(x=>x.w);
}

/* ===================== UI refs ===================== */
const $ = id => document.getElementById(id);
const elLevel=$('level'), elCount=$('count'), elScore=$('score'), elLives=$('lives');
const elTrail=$('trail'), elBigSyl=$('bigSyl'), elHeard=$('heard'), elPrompt=$('prompt');
const elMic=$('mic'), elMicLabel=$('micLabel'), elCands=$('cands'), elHintbox=$('hintbox');

function updateHUD(){
  elLevel.textContent = currentLevel();
  elCount.textContent = G.chain.length - 1;          // 시작어 제외, 아이가 이은 수
  elScore.textContent = G.score;
  elLives.textContent = '⭐'.repeat(G.lives) + '☆'.repeat(4-G.lives);
}
function renderTrail(){
  elTrail.innerHTML='';
  const show = G.chain.slice(-6);
  show.forEach((w,i)=>{
    if(i>0){ const a=document.createElement('span'); a.className='arrow'; a.textContent='→'; elTrail.appendChild(a); }
    const c=document.createElement('span'); c.className='word-chip'+(G.chain.indexOf(w)===0?' seed':'');
    c.textContent=w; elTrail.appendChild(c);
  });
  elTrail.scrollLeft = elTrail.scrollWidth;
}
function setPromptSyllable(){
  elBigSyl.textContent = G.curStarts[0];
  // 두음 대체가 있으면 작은 안내
  if(G.curStarts.length>1) elPrompt.innerHTML = `<b>${G.curStarts.join(' 또는 ')}</b> (으)로 시작하는 단어를 말해봐!`;
  else elPrompt.innerHTML = `<b>${G.curStarts[0]}</b> (으)로 시작하는 단어를 말해봐!`;
  elBigSyl.style.animation='none'; void elBigSyl.offsetWidth; elBigSyl.style.animation='';
}
function clearCands(){ elCands.classList.add('hidden'); elCands.innerHTML=''; }
function clearHint(){ elHintbox.classList.add('hidden'); elHintbox.innerHTML=''; }

/* ===================== TTS ===================== */
let koVoice = null;
function listKoVoices(){
  if(!('speechSynthesis' in window)) return [];
  const vs = speechSynthesis.getVoices();
  return vs.filter(v=>(v.lang||'').toLowerCase().replace('_','-').startsWith('ko'));
}
function loadVoices(){
  if(!('speechSynthesis' in window)) return;
  const ko = listKoVoices();
  // 저장된 선택 우선
  const saved = localStorage.getItem('kkutu_voice');
  if(saved){ const f = ko.find(v=>v.name===saved); if(f){ koVoice=f; return; } }
  // 여성/밝은 음성 우선(없으면 첫 한국어 음성)
  const pref = ['yuna','유나','sora','소라','nara','heami','female','여성','수진','지민','지영'];
  koVoice = ko.find(v=>pref.some(p=>(v.name||'').toLowerCase().includes(p))) || ko[0] || null;
}
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }

function speak(text){
  if(!('speechSynthesis' in window)) return;
  // 사전식 가운뎃점(ㆍ·‧・)·기호를 읽지 않도록 정리
  const clean = (text||'')
    .replace(/[ㆍ·‧・･]/g, ', ')
    .replace(/[「」『』〔〕\[\]]/g, ' ')
    .replace(/\s+/g, ' ').trim();
  if(!clean) return;
  try{
    if(!koVoice) loadVoices();               // 늦게 로드되는 음성 보정
    // iOS: 말하는 중일 때만 취소(취소 직후 speak가 무음되는 버그 회피)
    if(speechSynthesis.speaking || speechSynthesis.pending) speechSynthesis.cancel();
    try{ speechSynthesis.resume(); }catch(_){}
    const u = new SpeechSynthesisUtterance(clean);
    u.lang='ko-KR';
    if(koVoice) u.voice = koVoice;
    u.rate=1.0; u.pitch=1.25;   // 밝고 가벼운 톤
    speechSynthesis.speak(u);
  }catch(e){}
}
// 뜻만 읽어주기
function speakDef(w){ const e=ENTRY.get(w); speak(e&&e.def ? e.def : '뜻 정보가 없어요'); }
// 특정 음성 미리듣기
function previewVoice(v){
  if(!('speechSynthesis' in window)) return;
  try{
    if(speechSynthesis.speaking||speechSynthesis.pending) speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance('안녕! 나랑 끝말잇기 하자.');
    u.voice=v; u.lang='ko-KR'; u.rate=1.0; u.pitch=1.25;
    speechSynthesis.speak(u);
  }catch(e){}
}
// 목소리 고르기 모달
function openVoicePicker(){
  const ko = listKoVoices();
  const mask=document.createElement('div'); mask.className='mask';
  const m=document.createElement('div'); m.className='modal';
  m.innerHTML=`<h2>🔈 목소리 고르기</h2><div class="sub">마음에 드는 한국어 목소리를 골라요. (들어보기 → 이걸로!)</div>`;
  if(ko.length===0){
    m.innerHTML += `<div class="defpop">이 기기에 한국어 음성이 없어요.<br>아이패드: <b>설정 → 손쉬운 사용 → 음성 콘텐츠 → 음성 → 한국어</b>에서 음성을 받은 뒤 다시 열어주세요.</div>`;
  } else {
    const saved = localStorage.getItem('kkutu_voice');
    const list=document.createElement('div'); list.id='pickerList';
    ko.forEach(v=>{
      const cur = (saved && v.name===saved) || (!saved && koVoice && v.name===koVoice.name);
      const row=document.createElement('div'); row.className='pli'; row.style.cursor='default';
      row.innerHTML=`<span>${cur?'✅ ':''}${v.name}</span>
        <span style="display:flex;gap:8px"><button class="spk" style="border:none;background:var(--soft);border-radius:10px;padding:6px 10px">▶ 들어보기</button>
        <button class="lv" style="border:none">이걸로!</button></span>`;
      const btns=row.querySelectorAll('button');
      btns[0].onclick=()=>previewVoice(v);
      btns[1].onclick=()=>{ localStorage.setItem('kkutu_voice', v.name); loadVoices(); document.body.removeChild(mask); toast('목소리를 바꿨어요 🔈'); speak('이 목소리로 할게!'); };
      list.appendChild(row);
    });
    m.appendChild(list);
  }
  const close=document.createElement('button'); close.className='closebtn'; close.textContent='닫기';
  close.onclick=()=>document.body.removeChild(mask);
  m.appendChild(close); mask.appendChild(m); document.body.appendChild(mask);
}

/* ===================== Turn flow ===================== */
function startGame(){
  G.chain=[]; G.used.clear(); G.score=0; G.hintsThisTurn=0; G.lives=4; G.hintWord=null;
  // 시작어: 끝글자가 이어갈 수 있는 레벨1 단어 무작위
  let seed=null;
  for(let t=0;t<200;t++){
    const cand = LV1[Math.floor(Math.random()*LV1.length)];
    const starts = nextStarts(cand[cand.length-1]);
    if(starts.some(s=>BYSTART.has(s))){ seed=cand; break; }
  }
  if(!seed) seed = LV1[0];
  G.chain.push(seed); G.used.add(seed);
  G.curStarts = nextStarts(lastChar());
  $('startScreen').classList.add('hidden');
  $('endScreen').classList.add('hidden');
  newTurnUI();
  renderTrail(); updateHUD();
  toast(`시작 단어는 "${seed}" 예요!`);
}

function newTurnUI(){
  G.hintsThisTurn=0; G.hintWord=null;
  clearCands(); clearHint();
  elHeard.textContent='';
  setPromptSyllable();
  elMicLabel.textContent='마이크를 누르고 말해요';
}

// 단어 채택 → 다음 턴
function acceptWord(word, gained){
  G.score += gained;
  G.chain.push(word); G.used.add(word);
  G.curStarts = nextStarts(lastChar());
  renderTrail(); updateHUD();
  newTurnUI();
  // 더 이어갈 단어가 아예 없으면 종료
  if(validWords().length===0){ endGame('와! 더 이상 이을 단어가 없어요'); }
}

/* ----- "다시 말하기" 버튼 (재시도) ----- */
function retryButton(label){
  const r=document.createElement('button'); r.className='cand';
  r.style.gridColumn='1/-1'; r.style.background='var(--accent2)'; r.style.color='#7a5b00';
  r.style.fontSize='20px'; r.textContent = label || '🎤 다시 말하기';
  r.onclick=()=> startListening();
  return r;
}

/* ----- 후보 표시: 말한 것과 "비슷한 단어"만 보여줌 ----- */
function showCandidates(heardRaw){
  const valid = validWords();
  if(valid.length===0){ endGame('더 이상 이을 단어가 없어요'); return; }
  const hw = onlyHangul(heardRaw);
  elCands.innerHTML='';

  if(!hw){
    elHeard.innerHTML = '🤔 잘 못 들었어요. 다시 또박또박 말해볼까?';
    elCands.appendChild(retryButton('🎤 다시 말하기'));
    elCands.classList.remove('hidden');
    return;
  }

  // 들은 말과 발음이 비슷한 유효 단어만 추림 (임계값 이내)
  const hj = toJamo(hw);
  const THRESH = Math.max(2, Math.ceil(hj.length * 0.55));
  const scored = valid.map(w=>({w, d:editDist(hj, toJamo(w))})).sort((a,b)=>a.d-b.d);
  const near = scored.filter(x=>x.d <= THRESH).slice(0,4).map(x=>x.w);

  if(near.length===0){
    // 비슷한 단어가 없음 → 정답을 거저 주지 않고 다시 말하게
    elHeard.innerHTML = `🗣️ "${heardRaw}" — 비슷한 단어를 못 찾았어요. <b>${G.curStarts[0]}</b>(으)로 시작하는 단어를 다시 말해봐!`;
    elCands.appendChild(retryButton('🎤 다시 말하기'));
    elCands.classList.remove('hidden');
    return;
  }

  elHeard.innerHTML = `🗣️ 들은 말: <b>"${heardRaw}"</b> — 생각한 단어가 있나요?`;
  near.forEach(w=>{
    const b=document.createElement('button'); b.className='cand'; b.style.justifyContent='center';
    const span=document.createElement('span'); span.textContent=w;
    b.appendChild(span);
    b.onclick=()=>{
      const gained = G.hintsThisTurn===0?2 : G.hintsThisTurn===1?1:0;
      successFx();
      acceptWord(w, gained);
    };
    elCands.appendChild(b);
  });
  elCands.appendChild(retryButton('🎤 없어요, 다시 말하기'));
  elCands.classList.remove('hidden');
}

/* ===================== Speech recognition ===================== */
let recog=null, listening=false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function startListening(){
  if(!DATA_READY) return;
  if(!SR){ toast('이 브라우저는 마이크가 안돼서 단어를 골라요'); openPicker(); return; }
  if(listening){ try{recog.stop();}catch(e){} return; }
  try{
    recog = new SR();
    recog.lang='ko-KR'; recog.interimResults=false; recog.maxAlternatives=5;
    recog.onstart=()=>{ listening=true; elMic.classList.add('listening'); elMicLabel.textContent='듣고 있어요… 말해요!'; elHeard.textContent=''; clearCands(); };
    recog.onerror=(e)=>{ elMicLabel.textContent = e.error==='not-allowed' ? '마이크 권한을 허용해 주세요' : '다시 한 번 말해볼까요?'; };
    recog.onend=()=>{ listening=false; elMic.classList.remove('listening'); elMicLabel.textContent='마이크를 누르고 말해요'; };
    recog.onresult=(e)=>{
      let best='';
      try{
        if(e.results && e.results.length){
          const r0 = e.results[0];
          const alts=[]; for(const a of r0) alts.push(a.transcript||'');
          best = alts.slice().sort((a,b)=>onlyHangul(b).length-onlyHangul(a).length)[0] || alts[0] || '';
        }
      }catch(err){ best=''; }
      showCandidates(best);
    };
    recog.start();
  }catch(err){ toast('마이크를 쓸 수 없어 단어를 골라요'); openPicker(); }
}
elMic.addEventListener('click', startListening);

/* ===================== Hints ===================== */
function ensureHintWord(){
  if(G.hintWord && !G.used.has(G.hintWord) && G.curStarts.includes(G.hintWord[0])) return;
  const valid = validWords();
  G.hintWord = valid.length ? pickByLevel(valid,1)[0] : null;
}
$('btnHint').addEventListener('click', ()=>{
  ensureHintWord();
  if(!G.hintWord){ toast('힌트 줄 단어가 없어요'); return; }
  if(G.hintsThisTurn===0){
    G.hintsThisTurn=1;
    elHintbox.innerHTML = `<div>이런 초성으로 시작해요 (맞히면 1점!)</div><div class="cho">${choseong(G.hintWord)}</div>`;
    elHintbox.classList.remove('hidden');
  } else {
    G.hintsThisTurn=2;
    const e=ENTRY.get(G.hintWord);
    elHintbox.innerHTML = `<div>뜻으로 알아맞혀 봐요 (이제 0점) <span class="spk" style="cursor:pointer">🔊</span></div>
      <div style="margin-top:6px; color:#5a5a78">${e&&e.def?e.def:'(뜻 정보가 없어요)'}</div>`;
    elHintbox.classList.remove('hidden');
    elHintbox.querySelector('.spk').onclick=()=>speak(e&&e.def?e.def:G.hintWord);
  }
});

/* ===================== 골라서 입력 (보조) ===================== */
function openPicker(){
  const valid = validWords();
  if(valid.length===0){ endGame('더 이상 이을 단어가 없어요'); return; }
  const lvl=currentLevel();
  const sorted = valid.slice().sort((a,b)=> (ENTRY.get(a).lv-ENTRY.get(b).lv) || a.localeCompare(b,'ko'));
  const mask=document.createElement('div'); mask.className='mask';
  const m=document.createElement('div'); m.className='modal';
  m.innerHTML=`<h2>📝 단어 골라서 입력</h2><div class="sub">"${G.curStarts.join('/')}"(으)로 시작하는 단어 ${sorted.length}개 · 쉬운 것부터</div>`;
  const list=document.createElement('div'); list.id='pickerList';
  sorted.slice(0,150).forEach(w=>{
    const b=document.createElement('button'); b.className='pli';
    b.innerHTML=`<span>${w}</span><span style="display:flex;gap:8px;align-items:center"><span class="spk">🔊</span><span class="lv">Lv${ENTRY.get(w).lv}</span></span>`;
    b.querySelector('.spk').onclick=(ev)=>{ev.stopPropagation(); speakDef(w);};
    b.onclick=()=>{ const gained=G.hintsThisTurn===0?2:G.hintsThisTurn===1?1:0; document.body.removeChild(mask); successFx(); acceptWord(w,gained); };
    list.appendChild(b);
  });
  m.appendChild(list);
  const close=document.createElement('button'); close.className='closebtn'; close.textContent='닫기';
  close.onclick=()=>document.body.removeChild(mask);
  m.appendChild(close); mask.appendChild(m); document.body.appendChild(mask);
}
// openPicker 는 음성인식이 아예 불가능한 기기에서만 자동 대체로 사용됨

/* ===================== 모르겠어요 → 이어가기 찬스(4개) ===================== */
$('btnGiveup').addEventListener('click', ()=>{
  const valid = validWords();
  if(valid.length===0){ endGame('더 이상 이을 단어가 없어요'); return; }
  if(G.lives<=0){ endGame('이어가기 찬스를 다 썼어요'); return; }
  if(!confirm('정답 단어를 보면 이번 차례는 0점이에요. 단어를 볼까요?')) return;
  const four = pickByLevel(valid, Math.min(4, valid.length));
  const mask=document.createElement('div'); mask.className='mask';
  const m=document.createElement('div'); m.className='modal';
  m.innerHTML=`<h2>🤔 이런 단어가 있어요!</h2><div class="sub">단어를 누르면 뜻이 나와요 · 하나 골라 계속해요 (0점) · 남은 찬스 ${G.lives}개</div>`;
  const grid=document.createElement('div'); grid.className='wordgrid';
  const defpop=document.createElement('div'); defpop.className='defpop hidden';
  four.forEach(w=>{
    const b=document.createElement('button'); b.className='wgi'; b.style.justifyContent='center';
    b.innerHTML=`<span>${w}</span>`;
    b.onclick=()=>{
      const e=ENTRY.get(w);
      defpop.classList.remove('hidden');
      defpop.innerHTML=`<div><b>${w}</b> <span class="spk" style="cursor:pointer">🔊 뜻 듣기</span></div>
        <div style="margin-top:6px">${e&&e.def?e.def:'(뜻 정보가 없어요)'}</div>
        <button class="closebtn" style="margin-top:10px">이 단어로 계속하기 ▶</button>`;
      defpop.querySelector('.spk').onclick=()=>speakDef(w);
      defpop.querySelector('button').onclick=()=>{ G.lives--; document.body.removeChild(mask); acceptWord(w, 0); toast('계속 가자! 💪'); };
    };
    grid.appendChild(b);
  });
  m.appendChild(grid); m.appendChild(defpop);
  mask.appendChild(m); document.body.appendChild(mask);
});

/* ===================== 그만하기 / 종료 ===================== */
$('btnStop').addEventListener('click', ()=>{ if(confirm('그만하고 결과를 볼까요?')) endGame('여기까지! 잘했어요'); });

function bestRecord(){ const v=localStorage.getItem('kkutu_best'); return v?JSON.parse(v):{count:0,score:0}; }
function saveBest(count,score){
  const b=bestRecord();
  if(count>b.count || (count===b.count && score>b.score)){ localStorage.setItem('kkutu_best', JSON.stringify({count,score})); return true; }
  return false;
}
function endGame(msg){
  try{ if(recog) recog.stop(); }catch(e){}
  const count=G.chain.length-1, score=G.score;
  const isBest=saveBest(count,score); const b=bestRecord();
  $('endTitle').textContent = msg || '끝!';
  $('endEmoji').textContent = isBest ? '🏆' : '🎉';
  $('endCount').textContent = count;
  $('endScore').textContent = score;
  $('endBest').textContent = isBest ? '새 최고 기록! 🎊' : `최고 기록: ${b.count}개 · ${b.score}점`;
  // 다음엔 이렇게 — 막힌 자리의 가능한 단어 최대 10개
  const valid = validWords();
  const ten = pickByLevel(valid, Math.min(10, valid.length));
  const grid=$('endWords'); grid.innerHTML=''; $('endDef').classList.add('hidden');
  ten.forEach(w=>{
    const b2=document.createElement('button'); b2.className='wgi'; b2.style.justifyContent='center';
    b2.innerHTML=`<span>${w}</span>`;
    b2.onclick=()=>{
      const e=ENTRY.get(w); const dp=$('endDef'); dp.classList.remove('hidden');
      dp.innerHTML=`<div><b>${w}</b> <span class="spk" style="cursor:pointer">🔊 뜻 듣기</span></div>
        <div style="margin-top:6px">${e&&e.def?e.def:'(뜻 정보가 없어요)'}</div>`;
      dp.querySelector('.spk').onclick=()=>speakDef(w);
    };
    grid.appendChild(b2);
  });
  $('endScreen').classList.remove('hidden');
}

/* ===================== fx / toast ===================== */
let audioCtx=null;
function successFx(){
  elBigSyl.style.animation='none'; void elBigSyl.offsetWidth; elBigSyl.style.animation='pop .3s ease';
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='sine'; o.frequency.setValueAtTime(660, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(990, audioCtx.currentTime+0.12);
    g.gain.setValueAtTime(0.18, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.2);
    o.start(); o.stop(audioCtx.currentTime+0.2);
  }catch(e){}
}
let toastTimer=null;
function toast(t){
  const el=$('toast'); el.textContent=t; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

/* ===================== boot ===================== */
$('btnStart').addEventListener('click', startGame);
$('btnRestart').addEventListener('click', startGame);
$('btnVoice').addEventListener('click', openVoicePicker);
$('btnVoice2').addEventListener('click', openVoicePicker);

(async function boot(){
  const b=bestRecord();
  if(b.count>0) $('bestStart').textContent = `🏆 최고 기록: ${b.count}개 · ${b.score}점`;
  try{
    await loadData();
    $('loadMsg').textContent = `준비 완료! 단어 ${ENTRY.size.toLocaleString()}개 🎈`;
    if(!SR) $('loadMsg').textContent += ' (이 브라우저는 마이크가 없어 단어를 골라서 해요)';
  }catch(e){
    $('loadMsg').innerHTML = '⚠️ 단어 파일을 못 불러왔어요.<br>이 파일은 <b>인터넷 주소(http/https)</b>로 열어야 해요.<br>(serve.ps1 실행 또는 호스팅 후 접속)';
    $('btnStart').disabled=true; $('btnStart').style.opacity=.5;
  }
})();
